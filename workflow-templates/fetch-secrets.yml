name: Fetch Secrets from AWS Secrets Manager

# Reusable workflow — fetches application secrets from AWS Secrets Manager and
# exports them as masked environment variables so downstream jobs can consume them.
#
# Authentication uses OIDC (no long-lived AWS access keys stored in GitHub).
# The IAM role must allow secretsmanager:GetSecretValue on /app/{environment}/*
# and, if KMS encryption is enabled, kms:Decrypt on the CMK.
#
# Prerequisites:
#   1. Configure the GitHub OIDC provider in your AWS account:
#        aws iam create-open-id-connect-provider \
#          --url https://token.actions.githubusercontent.com \
#          --client-id-list sts.amazonaws.com \
#          --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1
#   2. Create an IAM role with a trust policy that scopes to your repo:
#        "StringLike": {
#          "token.actions.githubusercontent.com:sub":
#            "repo:YOUR_ORG/YOUR_REPO:environment:staging"
#        }
#   3. Attach a policy granting GetSecretValue on /app/{env}/* paths.
#
# Caller usage:
#   jobs:
#     secrets:
#       uses: ./.github/workflows/fetch-secrets.yml
#       with:
#         environment: staging
#         role-to-assume: arn:aws:iam::123456789012:role/github-actions-staging
#         secret-keys: '["stripe-api-key", "sendgrid-api-key"]'
#
#     deploy:
#       needs: secrets
#       runs-on: ubuntu-latest
#       steps:
#         - run: echo "Stripe key is available as $STRIPE_API_KEY"

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
        description: "Target environment (staging | production)"
      aws-region:
        type: string
        default: "us-east-1"
        description: "AWS region where secrets are stored"
      role-to-assume:
        type: string
        required: true
        description: "IAM role ARN to assume via OIDC (must have secretsmanager:GetSecretValue)"
      secret-keys:
        type: string
        required: true
        description: >
          JSON array of secret keys under /app/{environment}/ to fetch.
          Example: '["stripe-api-key", "sendgrid-api-key"]'
      role-session-name:
        type: string
        default: "github-actions-fetch-secrets"
        description: "AWS STS session name for audit trail (visible in CloudTrail)"
    outputs:
      secrets-fetched:
        description: "true if all requested secrets were fetched without errors"
        value: ${{ jobs.fetch.outputs.secrets-fetched }}

jobs:
  fetch:
    name: Fetch Secrets (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      secrets-fetched: ${{ steps.fetch.outcome == 'success' && 'true' || 'false' }}
    permissions:
      id-token: write  # OIDC token request
      contents: read   # checkout (if needed by later steps)

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: ${{ inputs.role-session-name }}

      - name: Fetch secrets and export as masked env vars
        id: fetch
        shell: bash
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          SECRET_KEYS: ${{ inputs.secret-keys }}
        run: |
          set -euo pipefail

          ERRORS=0

          # Iterate over the JSON array of secret keys
          while IFS= read -r KEY; do
            SECRET_PATH="/app/${ENVIRONMENT}/${KEY}"

            VALUE=$(aws secretsmanager get-secret-value \
              --secret-id "${SECRET_PATH}" \
              --query SecretString \
              --output text 2>/dev/null || true)

            if [[ -z "${VALUE}" ]]; then
              echo "::error::Secret not found or inaccessible: ${SECRET_PATH}"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            if [[ "${VALUE}" == "REPLACE_ME" ]]; then
              echo "::warning::Secret ${SECRET_PATH} still has placeholder value — skipping"
              continue
            fi

            # Mask the value in all subsequent log output
            echo "::add-mask::${VALUE}"

            # Derive the environment variable name: strip hyphens/spaces → underscores, uppercase
            ENV_NAME="${KEY^^}"
            ENV_NAME="${ENV_NAME//[-\s]/_}"
            printf '%s=%s\n' "${ENV_NAME}" "${VALUE}" >> "${GITHUB_ENV}"
            echo "Exported secret: ${SECRET_PATH} → \$${ENV_NAME}"

          done < <(echo "${SECRET_KEYS}" | jq -r '.[]')

          if [[ "${ERRORS}" -gt 0 ]]; then
            echo "::error::${ERRORS} secret(s) could not be fetched. Check IAM permissions."
            exit 1
          fi

      - name: Verify AWS session (post-fetch audit)
        if: always()
        run: |
          echo "Caller identity used for secret access:"
          aws sts get-caller-identity --query '{Account:Account,Arn:Arn}' --output table
