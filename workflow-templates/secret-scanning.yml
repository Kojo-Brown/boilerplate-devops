name: Secret Scanning (TruffleHog)

# Scans every push and pull request for leaked credentials, API keys, and other
# secrets using TruffleHog v3 with its high-signal entropy + regex detector set.
#
# Two scan modes are available:
#   diff  — scans only the commits introduced by the current push/PR (fast,
#           used by default on pull_request and push events).
#   full  — scans the entire git history from the initial commit (slow, useful
#           for an initial baseline or periodic scheduled sweeps).
#
# For pull_request events TruffleHog compares HEAD against the PR base so only
# the changed diff is scanned — this keeps CI fast while still catching secrets
# before they land in the default branch.
#
# Findings are surfaced as:
#   • GitHub Actions step annotations (::error:: lines visible in the PR checks UI)
#   • A SARIF report uploaded to GitHub Advanced Security (if enabled on the repo)
#   • A non-zero exit code that blocks merge when secrets are found
#
# ── Baseline / allow-listing ──────────────────────────────────────────────────
# To permanently silence a false positive, add the detector + raw value hash to
# .trufflehog-ignore at the repo root:
#
#   git log --all --oneline | trufflehog git . --json | jq -r '.SourceMetadata.Data.Git.commit + " " + .DetectorName'
#   trufflehog git . --only-verified --json | jq -r '.Raw' | sha256sum
#
# Then add an entry to .trufflehog-ignore:
#   <DetectorName>:<sha256-of-raw-value>
#
# ── Prerequisites ─────────────────────────────────────────────────────────────
# No AWS access keys or additional secrets are required — TruffleHog runs as a
# container action and needs only repository read access.
#
# To enable SARIF upload (GitHub Advanced Security required):
#   • The repository must be public, OR
#   • GitHub Advanced Security must be enabled for private repositories.
# If SARIF upload fails due to missing GHAS, the step is skipped (continue-on-error).
#
# ── Usage as a reusable workflow ──────────────────────────────────────────────
#
#   jobs:
#     secrets:
#       uses: ./.github/workflows/secret-scanning.yml
#       with:
#         scan-mode: diff
#         fail-on-unverified: false
#       permissions:
#         contents: read
#         security-events: write
#
# ── Usage as a standalone caller ──────────────────────────────────────────────
# Copy this file to .github/workflows/secret-scanning.yml in your repository.
# The on: push / pull_request triggers fire automatically.

on:
  workflow_call:
    inputs:
      scan-mode:
        type: string
        default: "diff"
        description: |
          "diff" scans only commits in the current push/PR (default).
          "full" scans the entire git history — use for initial baseline runs.
      fail-on-unverified:
        type: boolean
        default: false
        description: |
          When true, unverified findings (high-entropy strings that look like
          secrets but could not be confirmed live) also block the workflow.
          When false (default), only verified findings cause failure.
      base-ref:
        type: string
        default: ""
        description: |
          Override the base commit/ref for diff mode. Defaults to the PR base
          branch or the parent commit of the current push.
      head-ref:
        type: string
        default: "HEAD"
        description: |
          Override the head commit/ref for diff mode. Defaults to HEAD.
      trufflehog-version:
        type: string
        default: "latest"
        description: "TruffleHog Docker image tag (e.g. 'latest', '3.82.0')."
      upload-sarif:
        type: boolean
        default: true
        description: |
          Upload SARIF results to GitHub Advanced Security (requires
          security-events: write permission and GHAS enabled on the repo).
    outputs:
      verified-count:
        description: "Number of verified secrets found"
        value: ${{ jobs.scan.outputs.verified-count }}
      unverified-count:
        description: "Number of unverified (potential) secrets found"
        value: ${{ jobs.scan.outputs.unverified-count }}
      sarif-uploaded:
        description: "'true' if the SARIF report was successfully uploaded"
        value: ${{ jobs.scan.outputs.sarif-uploaded }}

  # Standalone triggers — remove these if using as a reusable workflow only.
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
      - "release/**"

  # Weekly full-history sweep to catch secrets committed before this workflow was added.
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC

permissions:
  contents: read
  security-events: write  # Required for SARIF upload to GitHub Advanced Security

jobs:
  scan:
    name: TruffleHog Secret Scan (${{ inputs.scan-mode || (github.event_name == 'schedule' && 'full') || 'diff' }})
    runs-on: ubuntu-latest
    outputs:
      verified-count: ${{ steps.parse.outputs.verified-count }}
      unverified-count: ${{ steps.parse.outputs.unverified-count }}
      sarif-uploaded: ${{ steps.upload-sarif.outcome == 'success' && 'true' || 'false' }}

    steps:
      - name: Checkout repository (full history for diff/full scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for git log traversal

      # ── Resolve scan range ─────────────────────────────────────────────────
      - name: Resolve scan range
        id: range
        shell: bash
        env:
          SCAN_MODE: ${{ inputs.scan-mode || (github.event_name == 'schedule' && 'full') || 'diff' }}
          INPUT_BASE: ${{ inputs.base-ref || '' }}
          INPUT_HEAD: ${{ inputs.head-ref || 'HEAD' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [[ "${SCAN_MODE}" == "full" ]]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "scan-range=--since-commit $(git rev-list --max-parents=0 HEAD)" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Full-history scan selected"
            exit 0
          fi

          # Diff mode — determine base commit
          if [[ -n "${INPUT_BASE}" ]]; then
            BASE="${INPUT_BASE}"
          elif [[ -n "${PR_BASE_SHA}" ]]; then
            # Pull request event — scan commits that the PR introduces
            BASE="${PR_BASE_SHA}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            # Push event — scan commits introduced since the previous HEAD
            BASE="${BEFORE_SHA}"
          else
            # Initial push or fallback — scan HEAD only
            BASE="HEAD~1"
          fi

          HEAD="${INPUT_HEAD}"
          echo "mode=diff" >> "$GITHUB_OUTPUT"
          echo "scan-range=--since-commit ${BASE} --branch ${HEAD}" >> "$GITHUB_OUTPUT"
          echo "ℹ️  Diff scan: ${BASE}..${HEAD}"

      # ── Run TruffleHog ─────────────────────────────────────────────────────
      - name: Run TruffleHog
        id: trufflehog
        shell: bash
        env:
          TRUFFLEHOG_VERSION: ${{ inputs.trufflehog-version || 'latest' }}
          SCAN_RANGE: ${{ steps.range.outputs.scan-range }}
          FAIL_ON_UNVERIFIED: ${{ inputs.fail-on-unverified || 'false' }}
        run: |
          set -euo pipefail

          RESULTS_FILE="${RUNNER_TEMP}/trufflehog-results.json"
          SARIF_FILE="${RUNNER_TEMP}/trufflehog.sarif"

          echo "ℹ️  Running TruffleHog ${TRUFFLEHOG_VERSION} …"
          echo "ℹ️  Scan range flags: ${SCAN_RANGE}"

          # Pull the TruffleHog image (pinned via tag for reproducibility)
          docker pull --quiet "ghcr.io/trufflesecurity/trufflehog:${TRUFFLEHOG_VERSION}"

          # Run TruffleHog — outputs one JSON object per finding (NDJSON)
          # --no-verification=false keeps verification ON (default behaviour)
          # --fail exits non-zero when verified secrets are found
          set +e
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo:ro" \
            "ghcr.io/trufflesecurity/trufflehog:${TRUFFLEHOG_VERSION}" \
            git /repo \
            ${SCAN_RANGE} \
            --json \
            --no-update \
            2>/dev/null \
          | tee "${RESULTS_FILE}"
          TRUFFLEHOG_EXIT=$?
          set -e

          # Separate verified from unverified findings
          VERIFIED=$(grep -c '"Verified":true' "${RESULTS_FILE}" 2>/dev/null || echo "0")
          UNVERIFIED=$(grep -c '"Verified":false' "${RESULTS_FILE}" 2>/dev/null || echo "0")

          echo "verified-count=${VERIFIED}"   >> "$GITHUB_OUTPUT"
          echo "unverified-count=${UNVERIFIED}" >> "$GITHUB_OUTPUT"
          echo "results-file=${RESULTS_FILE}" >> "$GITHUB_OUTPUT"
          echo "sarif-file=${SARIF_FILE}"     >> "$GITHUB_OUTPUT"

          echo ""
          echo "── TruffleHog Results ─────────────────────────"
          echo "  Verified secrets   : ${VERIFIED}"
          echo "  Unverified secrets : ${UNVERIFIED}"
          echo "───────────────────────────────────────────────"

          # Emit GitHub Actions annotations for each finding
          if [[ -s "${RESULTS_FILE}" ]]; then
            while IFS= read -r LINE; do
              [[ -z "${LINE}" ]] && continue
              DETECTOR=$(echo "${LINE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('DetectorName','unknown'))" 2>/dev/null || echo "unknown")
              IS_VERIFIED=$(echo "${LINE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Verified','false'))" 2>/dev/null || echo "false")
              COMMIT=$(echo "${LINE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('SourceMetadata',{}).get('Data',{}).get('Git',{}).get('commit','')[:12])" 2>/dev/null || echo "")
              FILE_PATH=$(echo "${LINE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('SourceMetadata',{}).get('Data',{}).get('Git',{}).get('file',''))" 2>/dev/null || echo "")

              if [[ "${IS_VERIFIED}" == "True" ]]; then
                echo "::error file=${FILE_PATH}::🔴 VERIFIED secret found [${DETECTOR}] commit=${COMMIT} — revoke this credential immediately"
              else
                echo "::warning file=${FILE_PATH}::🟡 Potential secret [${DETECTOR}] commit=${COMMIT} — review and rotate if real"
              fi
            done < "${RESULTS_FILE}"
          fi

          # Fail logic
          if [[ "${VERIFIED}" -gt 0 ]]; then
            echo "::error::❌ ${VERIFIED} VERIFIED secret(s) detected. Revoke exposed credentials immediately."
            exit 1
          fi

          if [[ "${FAIL_ON_UNVERIFIED}" == "true" && "${UNVERIFIED}" -gt 0 ]]; then
            echo "::error::❌ ${UNVERIFIED} unverified potential secret(s) detected and fail-on-unverified=true."
            exit 1
          fi

          echo "✅ No verified secrets found."

      # ── Convert results to SARIF ───────────────────────────────────────────
      - name: Convert findings to SARIF
        if: always() && steps.trufflehog.outputs.results-file != ''
        id: sarif
        shell: bash
        env:
          RESULTS_FILE: ${{ steps.trufflehog.outputs.results-file }}
          SARIF_FILE: ${{ steps.trufflehog.outputs.sarif-file }}
        run: |
          set -euo pipefail

          python3 - <<'PYTHON'
          import json, sys, os

          results_file = os.environ["RESULTS_FILE"]
          sarif_file   = os.environ["SARIF_FILE"]

          findings = []
          if os.path.isfile(results_file):
              with open(results_file) as f:
                  for line in f:
                      line = line.strip()
                      if line:
                          try:
                              findings.append(json.loads(line))
                          except json.JSONDecodeError:
                              pass

          rules = {}
          results = []

          for finding in findings:
              detector = finding.get("DetectorName", "UnknownDetector")
              verified = finding.get("Verified", False)
              git_meta = finding.get("SourceMetadata", {}).get("Data", {}).get("Git", {})
              file_path = git_meta.get("file", "unknown")
              commit    = git_meta.get("commit", "")[:12]
              line_num  = int(git_meta.get("line", 1) or 1)

              rule_id = f"TruffleHog/{detector}"
              if rule_id not in rules:
                  rules[rule_id] = {
                      "id": rule_id,
                      "name": detector,
                      "shortDescription": {"text": f"Potential {detector} credential detected"},
                      "fullDescription": {"text": f"TruffleHog detected a {detector} credential. Revoke and rotate if verified."},
                      "helpUri": "https://trufflesecurity.com/trufflehog",
                      "defaultConfiguration": {
                          "level": "error" if verified else "warning"
                      },
                  }

              results.append({
                  "ruleId": rule_id,
                  "level": "error" if verified else "warning",
                  "message": {
                      "text": (
                          f"{'VERIFIED' if verified else 'Potential'} {detector} secret found "
                          f"in commit {commit}. "
                          f"{'Revoke this credential immediately.' if verified else 'Review and rotate if real.'}"
                      )
                  },
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": file_path, "uriBaseId": "%SRCROOT%"},
                          "region": {"startLine": line_num, "startColumn": 1},
                      }
                  }],
              })

          sarif = {
              "version": "2.1.0",
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "TruffleHog",
                          "version": "3",
                          "informationUri": "https://trufflesecurity.com/trufflehog",
                          "rules": list(rules.values()),
                      }
                  },
                  "results": results,
              }],
          }

          with open(sarif_file, "w") as f:
              json.dump(sarif, f, indent=2)

          print(f"Wrote {len(results)} finding(s) to {sarif_file}")
          PYTHON

      # ── Upload SARIF to GitHub Advanced Security ──────────────────────────
      - name: Upload SARIF to GitHub Advanced Security
        id: upload-sarif
        if: always() && (inputs.upload-sarif == true || inputs.upload-sarif == '')
        continue-on-error: true  # GHAS may not be enabled; don't fail the whole job
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.trufflehog.outputs.sarif-file }}
          category: trufflehog

      # ── Print summary ──────────────────────────────────────────────────────
      - name: Print scan summary
        if: always()
        shell: bash
        env:
          VERIFIED: ${{ steps.trufflehog.outputs.verified-count || '0' }}
          UNVERIFIED: ${{ steps.trufflehog.outputs.unverified-count || '0' }}
          SARIF_STATUS: ${{ steps.upload-sarif.outcome }}
        run: |
          echo ""
          echo "┌──────────────────────────────────────────────┐"
          echo "│          TruffleHog Scan Summary             │"
          echo "├──────────────────────────────────────────────┤"
          printf "│  %-20s %23s  │\n" "Verified secrets:"   "${VERIFIED}"
          printf "│  %-20s %23s  │\n" "Potential secrets:"  "${UNVERIFIED}"
          printf "│  %-20s %23s  │\n" "SARIF upload:"       "${SARIF_STATUS}"
          echo "└──────────────────────────────────────────────┘"

          if [[ "${VERIFIED}" -gt 0 ]]; then
            echo ""
            echo "⚠️  ACTION REQUIRED: Verified secret(s) were found."
            echo "   1. Revoke and rotate the exposed credential(s) immediately."
            echo "   2. Remove the secret from git history with:"
            echo "      git filter-repo --path <file> --invert-paths"
            echo "      OR contact your security team for BFG Repo-Cleaner assistance."
            echo "   3. Force-push all branches and notify collaborators to re-clone."
            echo "   4. Enable GitHub secret scanning to catch future leaks:"
            echo "      https://docs.github.com/en/code-security/secret-scanning"
          fi

# ── Example caller workflows ──────────────────────────────────────────────────
#
# 1. Reuse this as a called workflow from a CI pipeline
# ────────────────────────────────────────────────────
#
# name: CI Pipeline
# on:
#   pull_request:
#     branches: [main]
#
# jobs:
#   secrets:
#     uses: ./.github/workflows/secret-scanning.yml
#     with:
#       scan-mode: diff
#       fail-on-unverified: false
#     permissions:
#       contents: read
#       security-events: write
#
#   build:
#     needs: secrets
#     runs-on: ubuntu-latest
#     steps:
#       - uses: actions/checkout@v4
#       - run: pnpm install && pnpm build
#
#
# 2. Scheduled full-history sweep (standalone, run weekly)
# ──────────────────────────────────────────────────────────
#
# name: Weekly Secret Scan
# on:
#   schedule:
#     - cron: "0 3 * * 1"   # Every Monday at 03:00 UTC
#
# jobs:
#   full-scan:
#     uses: ./.github/workflows/secret-scanning.yml
#     with:
#       scan-mode: full
#       fail-on-unverified: true   # stricter for scheduled baseline sweeps
#     permissions:
#       contents: read
#       security-events: write
#
#
# 3. Strict PR gate (block merge on any potential secret)
# ─────────────────────────────────────────────────────────
#
# name: PR Secret Gate
# on:
#   pull_request:
#     branches: [main, "release/**"]
#
# jobs:
#   secret-gate:
#     uses: ./.github/workflows/secret-scanning.yml
#     with:
#       scan-mode: diff
#       fail-on-unverified: true
#     permissions:
#       contents: read
#       security-events: write
